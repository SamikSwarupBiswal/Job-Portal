databases:
  - name: jobportal-db
    databaseName: jobportal
    user: jobportal_user
    plan: free

services:
  - type: web
    name: job-portal-samik
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn job_portal.wsgi:application"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: jobportal-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
